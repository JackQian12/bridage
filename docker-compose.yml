version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bridage
      POSTGRES_PASSWORD: bridage
      POSTGRES_DB: bridage
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bridage"]
      interval: 5s
      timeout: 5s
      retries: 10

  bridage:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://bridage:bridage@postgres:5432/bridage?sslmode=disable
      MASTER_KEY: ${MASTER_KEY}
      JWT_SECRET: ${JWT_SECRET}
      LISTEN_ADDR: 0.0.0.0:8080
      LOG_LEVEL: info
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    env_file:
      - .env

volumes:
  pgdata:
